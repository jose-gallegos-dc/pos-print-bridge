name: Build installers

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            builder-args: --linux deb rpm AppImage
            artifact-name: linux-installers
            artifact-glob: |
              release/*.deb
              release/*.rpm
              release/*.AppImage
              release/*.yml
              release/*.blockmap
          - os: windows-latest
            builder-args: --win
            artifact-name: windows-installer
            artifact-glob: |
              release/*.exe
              release/*.yml
              release/*.blockmap

    runs-on: ${{ matrix.os }}
    # Needed only for tag builds, which publish directly to a GitHub Release
    # via electron-builder (see the "Package and publish" step below).
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux native build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev rpm

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm exec electron-vite build

      - name: Package installers
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: pnpm exec electron-builder ${{ matrix.builder-args }} --publish=never

      # electron-builder itself uploads to the GitHub Release (not a separate
      # action) so the asset filenames match exactly what it wrote into
      # latest.yml / latest-linux.yml for auto-update — electron-builder
      # renames artifacts with spaces (e.g. "POS Print Bridge-1.0.0.AppImage")
      # to a hyphenated "safe" name only when it does this upload itself, so
      # re-uploading the raw build output through another tool would leave
      # electron-updater downloading a URL that 404s.
      - name: Package and publish installers
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm exec electron-builder ${{ matrix.builder-args }} --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
